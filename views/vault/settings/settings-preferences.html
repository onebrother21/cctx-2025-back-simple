<!-- Preferences Settings -->
<div class="settings-content" id="preferences">
<div class="card">
<div class="card-header">
  <h3 class="card-title">Display Preferences</h3>
  <p class="card-description">Customize how the app looks and behaves</p>
</div>

<div class="form-grid">
  <div class="form-group">
      <label class="form-label">Currency</label>
      <select class="form-select">
          <option value="usd" selected>USD - US Dollar</option>
          <option value="eur">EUR - Euro</option>
          <option value="gbp">GBP - British Pound</option>
          <option value="jpy">JPY - Japanese Yen</option>
      </select>
  </div>
  <div class="form-group">
      <label class="form-label">Language</label>
      <select class="form-select">
          <option value="en" selected>English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
      </select>
  </div>
  <div class="form-group">
      <label class="form-label">Timezone</label>
      <select class="form-select">
          <option value="est" selected>Eastern Time (ET)</option>
          <option value="pst">Pacific Time (PT)</option>
          <option value="utc">UTC</option>
          <option value="gmt">GMT</option>
      </select>
  </div>
  <div class="form-group">
      <label class="form-label">Date Format</label>
      <select class="form-select">
          <option value="mdy" selected>MM/DD/YYYY</option>
          <option value="dmy">DD/MM/YYYY</option>
          <option value="ymd">YYYY-MM-DD</option>
      </select>
  </div>
</div>

<div class="toggle-item">
  <div class="toggle-info">
      <div class="toggle-title">Dark Mode</div>
      <div class="toggle-description">Use dark theme for the interface</div>
  </div>
  <div class="toggle-switch active" id="darkModeToggle"></div>
</div>

<div class="toggle-item">
  <div class="toggle-info">
      <div class="toggle-title">Compact View</div>
      <div class="toggle-description">Show more data with smaller elements</div>
  </div>
  <div class="toggle-switch"></div>
</div>

<div class="btn-group">
  <button class="btn primary">Save Preferences</button>
  <button class="btn">Reset to Default</button>
</div>
</div>
</div>
