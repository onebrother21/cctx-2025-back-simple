<!-- Connected Accounts -->
<div class="settings-content" id="connected">
    <div class="card">
        <div class="card-header">
            <h3 class="card-title">Connected Exchanges</h3>
            <p class="card-description">Link your exchange accounts for seamless trading</p>
        </div>

        <div class="connected-item">
            <div class="connected-icon metamask">🦊</div>
            <div class="connected-info">
                <div class="connected-name">MetaMask</div>
                <div class="connected-status">Connected • 0x742d...5f83</div>

            <button class="security-btn">Disconnect</button>
        </div>

        <div class="connected-item">
            <div class="connected-icon coinbase">C</div>
            <div class="connected-info">
                <div class="connected-name">Coinbase</div>
                <div class="connected-status">Connected • alex.m@email.com</div>
            </div>
            <button class="security-btn">Disconnect</button>
        </div>

        <div class="connected-item">
            <div class="connected-icon binance">B</div>
            <div class="connected-info">
                <div class="connected-name">Binance</div>

        <div class="form-group">
            <label class="form-label">API Key</label>
            <input type="text" class="form-input" value="cv_live_xxxxxxxxxxxxxxxxxxxxxxxx" readonly>

        <div class="btn-group">
