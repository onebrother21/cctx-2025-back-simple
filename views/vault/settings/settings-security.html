<!-- Security Settings -->
<div class="settings-content" id="security">
    <div class="card">
        <div class="card-header">
            <h3 class="card-title">Security Settings</h3>
            <p class="card-description">Manage your account security and authentication methods</p>
        </div>
        <div class="security-item">
        <div class="security-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#b87333" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
        </div>
        <div class="security-info">
            <div class="security-title">Password</div>
            <div class="security-status enabled">Last changed 30 days ago</div>
        </div>
        <button class="security-btn">Change Password</button>
        </div>
        <div class="security-item">
        <div class="security-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#b87333" stroke-width="2">
                <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
                <line x1="12" y1="18" x2="12.01" y2="18"/>
            </svg>
        </div>
        <div class="security-info">
            <div class="security-title">Two-Factor Authentication</div>
            <div class="security-status enabled">Enabled via Authenticator App</div>
        </div>
        <button class="security-btn">Manage</button>
        </div>
        <div class="security-item">
        <div class="security-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#b87333" stroke-width="2">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
        </div>
        <div class="security-info">
            <div class="security-title">Biometric Login</div>
            <div class="security-status disabled">Not configured</div>
        </div>
        <button class="security-btn primary">Enable</button>
        </div>
        <div class="security-item">
        <div class="security-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#b87333" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
            </svg>
        </div>
        <div class="security-info">
            <div class="security-title">Active Sessions</div>
            <div class="security-status enabled">3 devices currently logged in</div>
        </div>
        <button class="security-btn">View All</button>
        </div>
    </div>
    <div class="card">
        <div class="card-header">
            <h3 class="card-title">Danger Zone</h3>
            <p class="card-description">Irreversible actions for your account</p>
        </div>
        <div class="btn-group">
            <button class="btn danger">Delete Account</button>
            <button class="btn danger">Export All Data</button>
        </div>
    </div>
</div>
