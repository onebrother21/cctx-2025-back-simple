<!-- Profile Settings -->
<div class="settings-content active" id="profile">
  <div class="card">
    <div class="profile-header">
      <div class="profile-avatar" onclick="myState.print()">
        AM
        <div class="avatar-edit">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </div>
      </div>
      <div class="profile-info">
        <h2>Alex Morgan</h2>
        <p>alex.morgan@email.com</p>
        <span class="profile-badge">Pro Trader</span>
      </div>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">First Name</label>
        <input type="text" class="form-input" value="Alex">
      </div>
      <div class="form-group">
        <label class="form-label">Last Name</label>
        <input type="text" class="form-input" value="Morgan">
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-input" value="alex.morgan@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input type="tel" class="form-input" value="+1 (555) 123-4567">
      </div>
      <div class="form-group full-width">
        <label class="form-label">Bio</label>
        <input type="text" class="form-input" placeholder="Tell us about yourself..." value="Crypto enthusiast and day trader since 2017">
      </div>
    </div>
    <div class="btn-group">
      <button class="btn primary">Save Changes</button>
      <button class="btn">Cancel</button>
    </div>
  </div>
</div>
