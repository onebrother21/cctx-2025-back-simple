<form data-validate id="loginForm">
  <div class="form-group">
    <label class="form-label" for="emailOrUsername">Email Or Username</label>
    <input type="text" id="emailOrUsername" name="emailOrUsername" 
    class="form-input" placeholder="Enter your email or username" required>
  </div>

  <div class="form-group">
    <label class="form-label" for="pin">Pin</label>
    <input type="password" id="pin" name="pin" 
    class="form-input pin-input" placeholder="Enter your pin" required>
  </div>

  <div class="form-row">
    <label class="checkbox-label"><input type="checkbox" checked>Remember me</label>
    <a href="#" class="forgot-link">Forgot Password?</a>
  </div>

  <button type="submit" class="btn btn-primary">
    Sign In
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="12 5 19 12 12 19"/>
    </svg>
  </button>
</form>
