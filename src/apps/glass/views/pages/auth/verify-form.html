<form data-validate id="verifyForm">
  <div class="form-group">
    <label class="form-label" for="verification">Verification Code</label>
    <input type="text" id="verification" name="verification"
    class="form-input verification-code" placeholder="Enter code" required>
  </div>

  <button type="submit" class="btn btn-primary">
    Verify
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="5" y1="12" x2="19" y2="12"/>
      <polyline points="12 5 19 12 12 19"/>
    </svg>
  </button>
</form>
