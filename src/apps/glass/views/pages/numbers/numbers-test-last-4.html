<div class="settings-tab-content numbers-test" id="tab-numbers-test-last-4">
  <div class="settings-section">
    <form data-validate id="deriveFromLast4Form">
      <input type="hidden" name="action" value="run-last-4">
      <h3 class="settings-section-title">Last 4 Draw Algo</h3>
      <div class="form-grid">
        <div class="form-group-settings full-width">
          <label for="seed1"></label>
          <input type="text" name="seed1" placeholder="Enter your numbers..." value="4 6 8 9 12 13 14 15 18 19 22 23">
          <input type="text" name="seed1desc" value="7/15 Day">
        </div>
        <div class="form-group-settings full-width">
          <label for="seed2"></label>
          <input type="text" name="seed2" placeholder="Enter your numbers..." value="1 4 8 9 11 12 14 18 20 10 22 24">
          <input type="text" name="seed2desc" value="7/15 Eve">
        </div>
        <div class="form-group-settings full-width">
          <label for="seed3"></label>
          <input type="text" name="seed3" placeholder="Enter your numbers..." value="2 3 9 11 13 14 15 17 19 20 21 22">
          <input type="text" name="seed3desc" value="7/15 Night">
        </div>
        <div class="form-group-settings full-width">
          <label for="seed4"></label>
          <input type="text" name="seed4" placeholder="Enter your numbers..." value="2 3 5 6 9 13 15 17 18 21 23 24">
          <input type="text" name="seed4desc" value="7/16 Morn">
        </div>
        <div class="form-group-settings full-width">
          <label for="seed5"></label>
          <input type="text" name="seed5" placeholder="Enter your numbers..." value="1 2 4 5 6 9 13 14 16 17 18 23">
          <input type="text" name="seed5desc" value="7/16 Day">
        </div>
      </div>
      <div class="btn-group">
        <button type="submit" class="btn btn-primary" style="width: auto;">
          Analyze
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </div>
    </form>
  </div>
  <div class="settings-section">
    <h3 class="settings-section-title">Strategy Results</h3>
    <div class="settings-row">
      <div class="settings-label">
        <span class="settings-label-title" id="calcComboResultsTitle">None to display</span>
        <span class="settings-label-desc" id="calcComboResults"></span>
      </div>
    </div>
    <button type="button" class="btn btn-default" style="width: auto;"> Show Numbers </button>
    <div class="table-wrapper" style="margin: 0;display:none">
      <table class="data-table" style="min-width: 100%;">
        <thead>
          <tr>
            <th>Name</th>
            <th>Nums</th>
          </tr>
        </thead>
        <tbody id="strategyResults"></tbody>
      </table>
    </div>
  </div>
</div>
