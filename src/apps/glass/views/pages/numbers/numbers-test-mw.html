<div class="settings-tab-content numbers-test" id="tab-numbers-test-mw">
  <div class="settings-section">
    <form data-validate id="movingWeightsStrategyForm">
      <input type="hidden" name="action" value="run-moving-w">
      <input type="hidden" name="type" value="moving-w">
      <h3 class="settings-section-title">Moving Weights Strategy Picker</h3>
      <div class="form-grid">
        <div class="form-group-settings full-width">
          <label for="Seed Numbers"></label>
          <input type="text" id="seedList" name="seedList" placeholder="Enter your numbers...">
        </div>
        <div class="form-group-settings">
          <label for="maxTimes">Min No.of Shifts (min = 1)</label>
          <input type="number" id="minTimes" name="minTimes" placeholder="Enter number of shifts"
          min="1" max="7" step="1" value="1">
        </div>
        <div class="form-group-settings">
          <label for="maxTimes">Max No.of Shifts (max = 7)</label>
          <input type="number" id="maxTimes" name="maxTimes" placeholder="Enter number of shifts"
          min="1" max="7" step="1" value="7">
        </div>
      </div>
      <div class="settings-row">
        <div class="settings-label">
          <span class="settings-label-title">Algorithms</span>
          <span class="settings-label-desc">Choose algo(s)</span>
        </div>
        <select class="settings-select" id="algos" name="algos">
          <option value="run-all" selected>Run All</option>
          <option value="add">Right Shift</option>
          <option value="sub">Left Shift</option>
        </select>
      </div>
      <div class="btn-group">
        <button type="submit" class="btn btn-primary" style="width: auto;">
          Pick Numbers
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
        <button class="btn btn-secondary" style="width: auto;">Reset to Default</button>
      </div>
    </form>
  </div>
  <div class="settings-section">
    <h3 class="settings-section-title">Strategy Results</h3>
    <div class="table-wrapper" style="margin: 0;">
      <table class="data-table" style="min-width: 100%;">
        <thead>
          <tr>
            <th>Name</th>
            <th>Nums</th>
          </tr>
        </thead>
        <tbody id="strategyResults"></tbody>
      </table>
    </div>
  </div>
</div>
