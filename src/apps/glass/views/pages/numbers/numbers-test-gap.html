<div class="settings-tab-content numbers-test" id="tab-numbers-test-gap">
  <div class="settings-section">
    <form data-validate id="gapFillStrategyForm">
      <input type="hidden" name="action" value="run-gap-fill">
      <input type="hidden" name="type" value="gap-fill">
      <h3 class="settings-section-title">Gap Fill Strategy Picker</h3>
      <div class="form-grid">
        <div class="form-group-settings full-width">
          <label for="seedList"></label>
          <input type="text" name="seedList" placeholder="Enter your seed numbers...">
        </div>
        <div class="form-group-settings full-width">
          <label for="winners"></label>
          <input type="text" name="winners" placeholder="Enter winning numbers...">
        </div>
        <div class="form-group-settings">
          <label for="maxInc">Max Increment</label>
          <input type="number" id="maxInc" name="maxInc" placeholder="Enter max increment" 
          min="1" max="10" step="1" value="1">
        </div>
        <div class="form-group-settings">
          <label for="maxTimes">Min No.of Shifts (min = 1)</label>
          <input type="number" id="minTimes" name="minTimes" placeholder="Enter number of shifts"
          min="1" max="7" step="1" value="1">
        </div>
        <div class="form-group-settings">
          <label for="maxTimes">Max No.of Shifts (max = 7)</label>
          <input type="number" id="maxTimes" name="maxTimes" placeholder="Enter number of shifts"
          min="1" max="7" step="1" value="7">
        </div>
      </div>
      <div class="settings-row">
      <div class="settings-label">
          <span class="settings-label-title">Algorithms</span>
          <span class="settings-label-desc">Choose algo(s)</span>
      </div>
      <select class="settings-select" id="algos" name="algos">
          <option value="run-all" selected>Run All</option>
          <option value="add">Add Only</option>
          <option value="sub">Subtract Only</option>
          <option value="add-then-sub">Add Then Subtract</option>
          <option value="sub-then-add">Subtract Then Add</option>
      </select>
      </div>
      <div class="settings-row">
      <div class="settings-label">
          <span class="settings-label-title">Directions</span>
          <span class="settings-label-desc">LTR, RTL, ALL</span>
      </div>
      <select class="settings-select" id="directions" name="directions">
          <option value="run-all" selected>Run All</option>
          <option value="ltr">LTR</option>
          <option value="rtl">RTL</option>
      </select>
      </div>
      <div class="btn-group">
        <button type="submit" class="btn btn-primary" style="width: auto;">
          Pick Numbers
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </div>
    </form>
  </div>
  <%- include('numbers-test-single-draw-output.html',{page,ui,user}) %>
</div>
